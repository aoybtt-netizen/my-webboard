<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GedGo! Games Zone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root { 
            --primary: #11998e; 
            --secondary: #38ef7d; 
            --dark: #2c3e50; 
            --light: #f8fafc; 
            --danger: #e74c3c;
            --accent: #f1c40f;
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background: var(--dark); /* พื้นหลังสีเข้มให้ฟีล Gamers */
            margin: 0; 
            color: white;
            overflow-x: hidden;
        }

        /* Header Area */
        .game-header {
            padding: calc(20px + env(safe-area-inset-top)) 20px 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            text-align: center;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .back-btn {
            position: absolute;
            left: 20px;
            top: calc(25px + env(safe-area-inset-top));
            color: white;
            font-size: 1.2rem;
            text-decoration: none;
            background: rgba(0,0,0,0.2);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Game Grid */
        .container { padding: 20px; }
        
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        /* Game Card Style */
        .game-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            text-decoration: none;
            color: white;
            position: relative;
        }

        .game-card:active { transform: scale(0.95); }

        .game-img {
            width: 100%;
            height: 120px;
            background-size: cover;
            background-position: center;
            background-color: #34495e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-info { padding: 12px; text-align: center; }
        .game-title { font-weight: bold; font-size: 0.9rem; display: block; }
        .game-tag { 
            font-size: 0.7rem; 
            background: var(--accent); 
            color: var(--dark); 
            padding: 2px 8px; 
            border-radius: 10px; 
            font-weight: bold;
            margin-top: 5px;
            display: inline-block;
        }

        /* Banner ส่วนลด/รางวัล */
        .promo-banner {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px dashed var(--secondary);
            display: flex;
            align-items: center;
            gap: 15px;
        }
    </style>
</head>
<body>

    <header class="game-header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="margin:0;">GedGo! Arcade</h2>
        <small style="opacity: 0.8;">เล่นเกมสนุก สะสมแต้มแลกรางวัล</small>
    </header>

    <div class="container">
        
        <div class="promo-banner">
            <i class="fas fa-trophy" style="font-size: 2rem; color: var(--accent);"></i>
            <div>
                <b style="display:block; color: var(--secondary);">กิจกรรมพิเศษ!</b>
                <small>ทำแต้มสูงสุดในโซนวันนี้ รับฟรี 20 เหรียญ!</small>
            </div>
        </div>

        <h3 style="margin-bottom: 15px;"><i class="fas fa-fire"></i> เกมยอดฮิต</h3>
        
        <div class="game-grid">
    <a href="void_expedition.html" class="game-card">
        <div class="game-img" style="background: linear-gradient(45deg, #0f2027, #203a43);">
            <i class="fas fa-rocket fa-3x" style="color: #38ef7d;"></i>
        </div>
        <div class="game-info">
            <span class="game-title">Void Expedition</span>
            <span class="game-tag">Sci-Fi Explorer</span>
        </div>
    </a>

    <div class="game-card" style="opacity: 0.5;">
        <div class="game-img">
            <i class="fas fa-lock fa-2x"></i>
        </div>
        <div class="game-info">
            <span class="game-title">GedGo Racing</span>
            <span class="game-tag" style="background:#666; color:#fff;">Soon</span>
        </div>
    </div>
</div>

    </div>

    <script>
        // พี่สามารถเพิ่มฟังก์ชันเช็ค Token หรือโหลดรายชื่อเกมจาก API ได้ที่นี่ครับ
    </script>
</body>
</html>
