<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GedGoZone: Void Expedition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #38ef7d;
            --glass: rgba(15, 25, 35, 0.85);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        /* --- พื้นหลังสถานีอวกาศ (เพิ่ม Transition สำหรับการทึบแสง) --- */
        #game-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('/images/station_bg.png'); 
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: filter 0.6s ease, transform 0.6s ease;
        }

        /* คลาสสำหรับทำให้พื้นหลังทึบแสงและซูมออกเล็กน้อย */
        .bg-dimmed {
            filter: brightness(0.15) saturate(0.5) blur(2px);
            transform: scale(1.05);
        }

        /* --- Canvas สำหรับ Hex Grid (วงกลมตรงกลาง) --- */
        #hex-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* --- HUD & Navigation --- */
        .hud-top {
            position: fixed; top: calc(10px + env(safe-area-inset-top));
            left: 10px; right: 10px; display: flex; gap: 10px; z-index: 100;
        }
        .res-item { background: var(--glass); padding: 5px 15px; border-radius: 5px; backdrop-filter: blur(5px); border-left: 3px solid var(--neon-blue); font-size: 0.8rem; }

        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 1000;
        }
        .nav-btn {
            width: 65px; height: 65px; background: var(--glass); border: 1px solid var(--neon-blue);
            border-radius: 12px; color: var(--neon-blue); display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-size: 0.7rem; gap: 5px;
        }
        .nav-btn:active { transform: scale(0.9); }

        /* --- Menu Overlay --- */
        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px);
            display: none; z-index: 2000; align-items: center; justify-content: center;
        }
        .glass-panel { background: var(--glass); border: 1px solid var(--neon-blue); border-radius: 20px; width: 85%; max-width: 400px; padding: 20px; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .list-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
    </style>
</head>
<body>

    <div id="game-background"></div>
    <canvas id="hex-canvas"></canvas>

    <div class="hud-top">
        <div class="res-item"><i class="fas fa-cube"></i> METAL: 500</div>
        <div class="res-item" style="border-color: var(--neon-green);"><i class="fas fa-bolt"></i> ENERGY: 100%</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn" onclick="openMenu('ship-menu')">
            <i class="fas fa-rocket"></i><span>ยาน</span>
        </div>
        <div class="nav-btn" onclick="openMapMode()">
            <i class="fas fa-map-marked-alt"></i><span>แผนที่</span>
        </div>
        <div class="nav-btn" style="border-color: var(--neon-green); color: var(--neon-green);" onclick="alert('วิจัย...')">
            <i class="fas fa-microscope"></i><span>วิจัย</span>
        </div>
    </div>

    <div id="map-menu" class="menu-overlay" onclick="closeMapMode(event)">
        <div class="glass-panel">
            <div class="panel-header">
                <h3><i class="fas fa-map"></i> ยุทธการ GedGoZone</h3>
                <i class="fas fa-times" style="cursor:pointer" onclick="closeMapMode()"></i>
            </div>
            <div class="list-item">
                <i class="fas fa-satellite-dish"></i>
                <div style="flex:1">รัศมีการสแกน: 250 LY</div>
            </div>
            <p style="font-size:0.8rem; opacity:0.7; text-align:center;">จิ้มที่ช่องหกเหลี่ยมเพื่อสั่งการยาน</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('hex-canvas');
        const ctx = canvas.getContext('2d');
        const bg = document.getElementById('game-background');
        
        let mapActive = false;

        // --- ระบบวาดหกเหลี่ยมวงกลมตรงกลาง ---
        function drawHex(x, y, radius) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                ctx.lineTo(x + radius * Math.cos(i * Math.PI / 3), y + radius * Math.sin(i * Math.PI / 3));
            }
            ctx.closePath();
            ctx.stroke();
        }

        function renderGrid() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const hexRadius = 35; // ลดขนาดหกเหลี่ยมลง
            const gridAreaRadius = 220; // รัศมีวงกลมที่ Grid จะแสดง
            
            const h = hexRadius * Math.sqrt(3);
            const w = hexRadius * 1.5;

            ctx.strokeStyle = '#00d2ff';
            ctx.lineWidth = 1.5;

            // วาด Grid ภายในขอบเขตวงกลม
            for (let x = centerX - gridAreaRadius - w; x < centerX + gridAreaRadius + w; x += w) {
                for (let y = centerY - gridAreaRadius - h; y < centerY + gridAreaRadius + h; y += h) {
                    const xPos = x;
                    // จัดการ offset ของรังผึ้ง
                    const column = Math.round((x - centerX) / w);
                    const yPos = y + (Math.abs(column) % 2 === 1 ? h / 2 : 0);

                    // เช็คระยะห่างจากจุดศูนย์กลางจอ
                    const dist = Math.sqrt(Math.pow(xPos - centerX, 2) + Math.pow(yPos - centerY, 2));
                    
                    if (dist < gridAreaRadius) {
                        drawHex(xPos, yPos, hexRadius - 2); // -2 เพื่อให้มีช่องว่างเล็กน้อยดูเท่
                    }
                }
            }
        }

        // --- ระบบเปิด/ปิด โหมดแผนที่ ---
        function openMapMode() {
            mapActive = true;
            bg.classList.add('bg-dimmed'); // พื้นหลังทึบแสง
            canvas.style.opacity = "1"; // แสดง Grid
            document.getElementById('map-menu').style.display = 'flex';
            renderGrid();
        }

        function closeMapMode(e) {
            // ถ้าคลิกข้างนอกแผงเมนู หรือกดปุ่มปิด
            if (!e || e.target.classList.contains('menu-overlay') || e.target.classList.contains('fa-times')) {
                mapActive = false;
                bg.classList.remove('bg-dimmed');
                canvas.style.opacity = "0";
                document.getElementById('map-menu').style.display = 'none';
            }
        }

        function openMenu(id) {
            document.getElementById(id).style.display = 'flex';
        }

        window.addEventListener('resize', () => { if(mapActive) renderGrid(); });
    </script>
</body>
</html>
