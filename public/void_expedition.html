<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GedGoZone: Void Expedition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #38ef7d;
            --glass: rgba(15, 25, 35, 0.85);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- พื้นหลังสถานีอวกาศ --- */
        #game-background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('/images/station_bg.png'); 
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: filter 0.6s ease, transform 0.6s ease;
        }

        .bg-dimmed {
            filter: brightness(0.2) blur(3px);
            transform: scale(1.05);
        }

        /* --- Canvas สำหรับ Hex Grid --- */
        #hex-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        /* --- HUD ด้านบน --- */
        .hud-top {
            position: fixed; top: calc(10px + env(safe-area-inset-top));
            left: 10px; right: 10px; display: flex; gap: 10px; z-index: 100;
        }
        .res-item { 
            background: var(--glass); color: white; padding: 5px 15px; 
            border-radius: 5px; backdrop-filter: blur(5px); 
            border-left: 3px solid var(--neon-blue); font-size: 0.8rem; 
        }

        /* --- ปุ่มนำทางด้านล่าง --- */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 1000;
        }
        .nav-btn {
            width: 65px; height: 65px; background: var(--glass); border: 1px solid var(--neon-blue);
            border-radius: 12px; color: var(--neon-blue); display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-size: 0.7rem; gap: 5px;
            backdrop-filter: blur(10px);
        }
        .nav-btn.active {
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 15px rgba(56, 239, 125, 0.4);
        }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

    <div id="game-background"></div>
    <canvas id="hex-canvas"></canvas>

    <div class="hud-top">
        <div class="res-item"><i class="fas fa-cube"></i> METAL: 500</div>
        <div class="res-item" style="border-color: var(--neon-green);"><i class="fas fa-bolt"></i> ENERGY: 100%</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn" id="btn-ship" onclick="alert('กองยานยังว่างเปล่า...')">
            <i class="fas fa-rocket"></i><span>ยาน</span>
        </div>
        <div class="nav-btn" id="btn-map" onclick="toggleMapMode(event)">
            <i class="fas fa-map-marked-alt"></i><span>แผนที่</span>
        </div>
        <div class="nav-btn" style="border-color: #666; color: #666;">
            <i class="fas fa-lock"></i><span>ล็อค</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('hex-canvas');
        const ctx = canvas.getContext('2d');
        const bg = document.getElementById('game-background');
        const mapBtn = document.getElementById('btn-map');
        
        let mapActive = false;

        // --- ฟังก์ชันวาดหกเหลี่ยม ---
        function drawHex(x, y, radius, color, lineWidth, fill = false) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            for (let i = 0; i < 6; i++) {
                ctx.lineTo(x + radius * Math.cos(i * Math.PI / 3), y + radius * Math.sin(i * Math.PI / 3));
            }
            ctx.closePath();
            if (fill) {
                ctx.fillStyle = 'rgba(56, 239, 125, 0.1)';
                ctx.fill();
            }
            ctx.stroke();
        }

        function renderGrid() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const hexRadius = 40; 
            const gridAreaRadius = 200; 
            
            const h = hexRadius * Math.sqrt(3);
            const w = hexRadius * 1.5;

            // วาดช่องปกติ
            for (let x = centerX - gridAreaRadius - w; x < centerX + gridAreaRadius + w; x += w) {
                for (let y = centerY - gridAreaRadius - h; y < centerY + gridAreaRadius + h; y += h) {
                    const column = Math.round((x - centerX) / w);
                    const yPos = y + (Math.abs(column) % 2 === 1 ? h / 2 : 0);
                    const xPos = x;

                    const dist = Math.sqrt(Math.pow(xPos - centerX, 2) + Math.pow(yPos - centerY, 2));
                    
                    // เช็คว่าเป็นช่องกึ่งกลางเป๊ะๆ หรือไม่
                    const isCenter = dist < 5; // ระยะห่างน้อยมากจากจุดศูนย์กลาง

                    if (dist < gridAreaRadius) {
                        if (isCenter) {
                            // 🚩 วาดช่องตำแหน่งปัจจุบันของเรา (Highlight)
                            drawHex(xPos, yPos, hexRadius - 2, '#38ef7d', 3, true);
                            // เพิ่มเอฟเฟกต์วงแหวนรอบนอกให้ดู Epic
                            ctx.setLineDash([5, 5]);
                            drawHex(xPos, yPos, hexRadius + 5, 'rgba(56, 239, 125, 0.5)', 1);
                            ctx.setLineDash([]);
                        } else {
                            // วาดช่องปกติ
                            drawHex(xPos, yPos, hexRadius - 2, 'rgba(0, 210, 255, 0.6)', 1);
                        }
                    }
                }
            }
        }

        function toggleMapMode(e) {
            e.stopPropagation(); // กันไม่ให้ handleGlobalClick ทำงานทันที
            mapActive = !mapActive;

            if (mapActive) {
                bg.classList.add('bg-dimmed');
                canvas.style.opacity = "1";
                mapBtn.classList.add('active');
                renderGrid();
            } else {
                exitMapMode();
            }
        }

        function exitMapMode() {
            mapActive = false;
            bg.classList.remove('bg-dimmed');
            canvas.style.opacity = "0";
            mapBtn.classList.remove('active');
        }

        function handleGlobalClick(e) {
            // ถ้าเปิดแผนที่อยู่แล้วคลิกที่ไหนก็ได้ (ที่ไม่ใช่ปุ่มเมนู) ให้ปิดแผนที่
            if (mapActive && !e.target.closest('.nav-btn')) {
                exitMapMode();
            }
        }

        window.addEventListener('resize', () => { if(mapActive) renderGrid(); });
    </script>
</body>
</html>
