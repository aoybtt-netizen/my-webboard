<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GedGoZone: Void Expedition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000; /* สีดำกันสำรองระหว่างโหลด */
        }

        /* Container สำหรับพื้นหลัง */
        #game-container {
            position: relative;
            width: 100vw; height: 100vh;
            /* 🚩 เรียกใช้ไฟล์ภาพจากเซิร์ฟเวอร์ */
            background-image: url('/images/station_bg.jpg'); 
            background-size: cover; /* ให้ภาพคลุมพื้นที่ทั้งหมด */
            background-position: center; /* จัดภาพให้อยู่ตรงกลาง */
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Overlay ตกแต่งแบบล้ำๆ (Vignette) */
        #game-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
        }

        /* UI เบื้องต้น */
        .loading-text {
            color: #38ef7d;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(56, 239, 125, 0.8);
            z-index: 10;
        }

        /* ปุ่มกลับหน้าเลือกเกม */
        .back-nav {
            position: fixed;
            top: calc(20px + env(safe-area-inset-top));
            left: 20px;
            z-index: 100;
            color: white;
            text-decoration: none;
            background: rgba(0,0,0,0.5);
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <a href="gedgozonegame.html" class="back-nav">
        <i class="fas fa-chevron-left"></i> ย้อนกลับ
    </a>

    <div id="game-container">
        <div class="loading-text" id="status">Establishing Link...</div>
    </div>

    <script>
        window.onload = () => {
            const status = document.getElementById('status');
            // จำลองการโหลดระบบ
            setTimeout(() => {
                status.innerHTML = "GedGoZone Station: Online";
                status.style.opacity = "0.5"; // ให้จางลงเมื่อโหลดเสร็จ
            }, 1500);
        };
    </script>
</body>
</html>
