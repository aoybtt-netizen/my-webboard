<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GedGoZone: Void Expedition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #38ef7d;
            --neon-red: #ff4b2b;
            --glass: rgba(15, 25, 35, 0.85);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        /* --- View Management --- */
        .view { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; }
        .view.active { display: block; }

        /* --- Map View Style --- */
        #game-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('/images/station_bg.png'); 
            background-size: cover; background-position: center;
            z-index: 1; transition: filter 0.6s ease;
        }
        .bg-dimmed { filter: brightness(0.2) blur(3px); }

        #hex-canvas {
            position: fixed; top: 0; left: 0; z-index: 5;
            pointer-events: auto; /* เปิดให้คลิกบน Canvas ได้ */
            opacity: 0; transition: opacity 0.4s ease;
        }

        /* --- Mining View Style --- */
        #mining-view {
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            z-index: 3000; flex-direction: column; align-items: center; justify-content: center;
        }

        .asteroid-display {
            width: 250px; height: 250px;
            background: url('/images/asteroid_target.png') no-repeat center; /* พี่ต้องมีรูปอุกกาบาตอันนี้ */
            background-size: contain;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 20px rgba(0,210,255,0.2));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .progress-container {
            width: 80%; max-width: 400px; height: 12px;
            background: rgba(255,255,255,0.1); border-radius: 6px;
            border: 1px solid var(--neon-blue); overflow: hidden;
        }
        .progress-bar { width: 0%; height: 100%; background: var(--neon-blue); transition: width 0.1s linear; }

        /* --- Alert System --- */
        #alert-overlay {
            position: fixed; top: 20%; left: 50%; transform: translateX(-50%);
            background: rgba(255, 75, 43, 0.9); padding: 15px 30px;
            border-radius: 10px; border: 2px solid white;
            z-index: 4000; display: none; font-weight: bold;
            box-shadow: 0 0 20px var(--neon-red);
            animation: blink 0.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* --- HUD & UI --- */
        .hud-top { position: fixed; top: 20px; left: 20px; z-index: 100; display: flex; gap: 10px; }
        .res-item { background: var(--glass); padding: 5px 15px; border-radius: 5px; border-left: 3px solid var(--neon-blue); font-size: 0.8rem; }
        
        .bottom-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 1000; }
        .nav-btn { width: 65px; height: 65px; background: var(--glass); border: 1px solid var(--neon-blue); border-radius: 12px; color: var(--neon-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .nav-btn.active { border-color: var(--neon-green); color: var(--neon-green); }

        /* --- Ship Menu --- */
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .glass-panel { background: var(--glass); border: 1px solid var(--neon-blue); border-radius: 20px; width: 85%; max-width: 450px; padding: 20px; }
        .ship-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .module-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; text-align: center; border: 1px solid rgba(0,210,255,0.2); }
    </style>
</head>
<body>

    <div id="alert-overlay">⚠️ WARNING: VOID PARASITE DETECTED!</div>

    <div id="view-map" class="view active">
        <div id="game-background"></div>
        <canvas id="hex-canvas"></canvas>
        
        <div class="hud-top">
            <div class="res-item">METAL: <span id="val-metal">500</span></div>
            <div class="res-item">ENERGY: <span id="val-energy">100%</span></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-btn" onclick="openMenu('ship-menu')"><i class="fas fa-rocket"></i><span>ยาน</span></div>
            <div class="nav-btn" id="btn-map" onclick="toggleMapMode()"><i class="fas fa-map-marked-alt"></i><span>แผนที่</span></div>
        </div>
    </div>

    <div id="view-mining" class="view">
        <div style="text-align: center;">
            <h2 id="mining-status">EXTRACTING RESOURCES...</h2>
            <div class="asteroid-display"></div>
            <div class="progress-container">
                <div id="mining-bar" class="progress-bar"></div>
            </div>
            <p style="margin-top: 20px; opacity: 0.7;">Mining Level: 1.0x</p>
            <button onclick="exitMining()" style="margin-top: 30px; background: transparent; color: var(--neon-red); border: 1px solid var(--neon-red); padding: 10px 20px; border-radius: 5px;">ABORT MISSION</button>
        </div>
    </div>

    <div id="ship-menu" class="menu-overlay" onclick="closeMenus(event)">
        <div class="glass-panel">
            <div style="text-align:center"><img src="/images/ship.png" style="width: 150px; margin-bottom: 10px;"></div>
            <h3>SHIP MODULAR SYSTEM</h3>
            <div class="ship-grid">
                <div class="module-card"><b>STORAGE</b><br><small>Level 1</small></div>
                <div class="module-card"><b>ENGINE</b><br><small>Level 1</small></div>
                <div class="module-card"><b>DRILL</b><br><small>Level 1</small></div>
                <div class="module-card"><b>POWER</b><br><small>Level 1</small></div>
                <div class="module-card" style="border-style: dashed;">EMPTY</div>
                <div class="module-card" style="border-style: dashed;">EMPTY</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('hex-canvas');
        const ctx = canvas.getContext('2d');
        const bg = document.getElementById('game-background');
        const mapBtn = document.getElementById('btn-map');

        let mapActive = false;
        let isMining = false;

        // --- ระบบวาด Hex Grid ---
        function renderGrid() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const hexRadius = 30; // 🚩 ลดขนาดตามสั่ง
    const h = hexRadius * Math.sqrt(3);
    const w = hexRadius * 1.5;

    // วาดจาก -2 ถึง 2 (รวมเป็น 5x5 ช่อง รอบจุดกึ่งกลาง)
    for (let q = -2; q <= 2; q++) {
        for (let r = -2; r <= 2; r++) {
            
            // คำนวณพิกัด X
            const xPos = centerX + (q * w);
            
            // คำนวณพิกัด Y พร้อมทำ Zig-zag (Offset)
            // ถ้าคอลัมน์ (q) เป็นเลขคี่ ให้ขยับตำแหน่ง Y ลงมาครึ่งหนึ่งของความสูงหกเหลี่ยม
            const yOffset = (Math.abs(q) % 2 === 1) ? h / 2 : 0;
            const yPos = centerY + (r * h) + yOffset;

            // 🚩 ตรวจสอบว่าเป็นจุดกึ่งกลางเป๊ะๆ (q=0, r=0) หรือไม่
            const isCenter = (q === 0 && r === 0);

            ctx.beginPath();
            // สีเขียวสำหรับจุดกลาง, สีฟ้าจางสำหรับจุดรอบๆ
            ctx.strokeStyle = isCenter ? '#38ef7d' : 'rgba(0, 210, 255, 0.3)';
            ctx.lineWidth = isCenter ? 3 : 1;

            // วาดรูป 6 เหลี่ยม
            for (let i = 0; i < 6; i++) {
                const angle = i * Math.PI / 3;
                ctx.lineTo(
                    xPos + hexRadius * Math.cos(angle),
                    yPos + hexRadius * Math.sin(angle)
                );
            }
            ctx.closePath();

            // ถ้าเป็นจุดกลาง ให้ใส่สีพื้นหลังจางๆ ให้เด่นขึ้นด้วย
            if (isCenter) {
                ctx.fillStyle = 'rgba(56, 239, 125, 0.15)';
                ctx.fill();
            }

            ctx.stroke();
        }
    }
}

        // --- ระบบสลับ View ---
        function toggleMapMode() {
            mapActive = !mapActive;
            bg.classList.toggle('bg-dimmed', mapActive);
            canvas.style.opacity = mapActive ? "1" : "0";
            mapBtn.classList.toggle('active', mapActive);
            if(mapActive) renderGrid();
        }

        // คลิกที่ช่อง Hex (จำลองการเลือกจุดขุด)
        canvas.onclick = (e) => {
            if(!mapActive) return;
            // ในอนาคตจะเช็คพิกัด แต่ตอนนี้จิ้มตรงไหนก็ได้ขุดครับ
            startMiningSequence();
        };

        // --- ระบบขุดแร่ (Mining Logic) ---
        function startMiningSequence() {
            mapActive = false;
            exitMapMode();
            document.getElementById('view-map').classList.remove('active');
            document.getElementById('view-mining').classList.add('active');
            document.getElementById('view-mining').style.display = 'flex';
            
            isMining = true;
            let progress = 0;
            const bar = document.getElementById('mining-bar');

            let mineTimer = setInterval(() => {
                if(!isMining) { clearInterval(mineTimer); return; }
                
                progress += 1;
                bar.style.width = progress + "%";

                // สุ่มศัตรูโผล่ที่ 40%
                if(progress === 40 && Math.random() > 0.5) {
                    showThreatAlert();
                }

                if(progress >= 100) {
                    clearInterval(mineTimer);
                    sendMiningData();
                }
            }, 50); // ความเร็วในการขุด
        }

        function showThreatAlert() {
            const alertUI = document.getElementById('alert-overlay');
            alertUI.style.display = 'block';
            setTimeout(() => { alertUI.style.display = 'none'; }, 3000);
        }

        async function sendMiningData() {
            // ส่งไปหา Server
            try {
                const res = await fetch('/api/mine', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: 'gedgo_user_1', drillLevel: 1 })
                });
                const data = await res.json();
                document.getElementById('val-metal').innerText = data.metal;
                document.getElementById('val-energy').innerText = data.energy + "%";
                alert("Extraction Complete! Metal Received.");
                exitMining();
            } catch(e) {
                alert("Server Connection Failed!");
                exitMining();
            }
        }

        function exitMining() {
            isMining = false;
            document.getElementById('view-mining').classList.remove('active');
            document.getElementById('view-mining').style.display = 'none';
            document.getElementById('view-map').classList.add('active');
            document.getElementById('mining-bar').style.width = "0%";
        }

        function openMenu(id) { document.getElementById(id).style.display = 'flex'; }
        function closeMenus(e) { if(e.target.className === 'menu-overlay') e.target.style.display = 'none'; }
        function exitMapMode() { bg.classList.remove('bg-dimmed'); canvas.style.opacity = "0"; mapBtn.classList.remove('active'); }

    </script>
</body>
</html>
