<!DOCTYPE html>
<html lang="th">
<head>

	<script src="https://accounts.google.com/gsi/client" async defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GedGoZone: Void Expedition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #38ef7d;
            --neon-red: #ff4b2b;
            --glass: rgba(15, 25, 35, 0.85);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        /* --- View Management --- */
        .view { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; }
        .view.active { display: block; }

        /* --- Auth View Style --- */
        #view-auth {
            background: radial-gradient(circle, #001a33 0%, #000 100%);
            z-index: 5000;
            display: none;
            align-items: center; justify-content: center;
        }
        #view-auth.active { display: flex; }

        .auth-input {
            width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px;
            border: 1px solid rgba(0, 210, 255, 0.3); background: rgba(0,0,0,0.6);
            color: white; box-sizing: border-box; outline: none;
        }
        .auth-btn {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: var(--neon-blue); color: #000; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }

        /* --- UI Overlay (Modals) --- */
        .menu-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); 
            z-index: 4000; display: none; align-items: center; justify-content: center; 
        }
        .glass-panel { 
            background: var(--glass); border: 1px solid var(--neon-blue); 
            border-radius: 20px; width: 85%; max-width: 400px; padding: 30px; 
            text-align: center; box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
        }

        /* --- Game Styles --- */
        #game-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('/images/station_bg.png'); background-size: cover; background-position: center; z-index: 1; transition: filter 0.6s ease; }
        .bg-dimmed { filter: brightness(0.2) blur(3px); }
        #hex-canvas { position: fixed; top: 0; left: 0; z-index: 5; opacity: 0; transition: opacity 0.4s ease; pointer-events: auto; }
        .hud-top { position: fixed; top: 20px; left: 20px; z-index: 100; display: flex; gap: 10px; }
        .res-item { background: var(--glass); padding: 5px 15px; border-radius: 5px; border-left: 3px solid var(--neon-blue); font-size: 0.8rem; backdrop-filter: blur(5px); }
        .bottom-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 1000; }
        .nav-btn { width: 65px; height: 65px; background: var(--glass); border: 1px solid var(--neon-blue); border-radius: 12px; color: var(--neon-blue); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 0.7rem; }
        
        /* Mining View */
        #view-mining { z-index: 3000; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .progress-container { width: 80%; max-width: 400px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; border: 1px solid var(--neon-blue); overflow: hidden; margin: 20px 0; }
        .progress-bar { width: 0%; height: 100%; background: var(--neon-blue); transition: width 0.1s linear; }
    </style>
</head>
<body>

    <div id="view-auth" class="view active" style="z-index: 5000; background: radial-gradient(circle, #001a33 0%, #000 100%);">
    <div class="glass-panel" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
        <h2 style="color:var(--neon-blue); text-align:center;"><i class="fab fa-google"></i> GEDGO EXPEDITION</h2>
        <p style="text-align:center; font-size:0.8rem; opacity:0.7; margin-bottom: 25px;">ยืนยันตัวตนผ่าน Google เพื่อเริ่มการสำรวจ</p>
        
        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="filled_blue" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
    </div>
</div>

<div id="nickname-modal" class="menu-overlay">
    <div class="glass-panel">
        <h3 style="color:var(--neon-green)">CALLSIGN REQUIRED</h3>
        <p style="font-size:0.8rem;">ระบุชื่อเรียกขานของคุณในระบบ GedGoZone</p>
        <input type="text" id="input-nickname" placeholder="ตั้งชื่อในเกม..." class="auth-input" style="text-align:center;">
        <button onclick="saveGameNickname()" class="auth-btn" style="background:var(--neon-green)">เริ่มภารกิจ</button>
    </div>
</div>

    <div id="view-map" class="view">
        <div id="game-background"></div>
        <canvas id="hex-canvas"></canvas>
        <div class="hud-top">
            <div class="res-item" style="border-color: var(--neon-green);">
                <i class="fas fa-user-astronaut"></i> <span id="display-nickname">PILOT</span>
            </div>
            <div class="res-item">METAL: <span id="val-metal">0</span></div>
            <div class="res-item">ENERGY: <span id="val-energy">0%</span></div>
        </div>
        <div class="bottom-nav">
            <div class="nav-btn" onclick="openMenu('ship-menu')"><i class="fas fa-rocket"></i><span>ยาน</span></div>
            <div class="nav-btn" id="btn-map" onclick="toggleMapMode()"><i class="fas fa-map-marked-alt"></i><span>แผนที่</span></div>
            <div class="nav-btn" onclick="handleLogout()" style="border-color:var(--neon-red); color:var(--neon-red);"><i class="fas fa-power-off"></i><span>ออก</span></div>
        </div>
    </div>

    <div id="view-mining" class="view">
        <h2 id="mining-status">EXTRACTING...</h2>
        <div class="progress-container"><div id="mining-bar" class="progress-bar"></div></div>
        <button onclick="exitMining()" style="background:transparent; border:1px solid var(--neon-red); color:var(--neon-red); padding:10px 20px; border-radius:8px;">ABORT</button>
    </div>

    <div id="ship-menu" class="menu-overlay" onclick="closeMenus(event)">
        <div class="glass-panel">
            <h3>MODULAR SYSTEM</h3>
            <div id="module-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
                <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px;">STORAGE</div>
                <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px;">ENGINE</div>
                <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px;">DRILL</div>
                <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px;">POWER</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('hex-canvas');
        const ctx = canvas.getContext('2d');
        const bg = document.getElementById('game-background');
        
        let currentUser = localStorage.getItem('username');
        let mapActive = false;
        let isMining = false;

        // --- ระบบ Auth ---
        function toggleAuth(mode) {
            document.getElementById('login-form').style.display = (mode === 'login') ? 'block' : 'none';
            document.getElementById('register-form').style.display = (mode === 'register') ? 'block' : 'none';
        }

        async function handleLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('username', data.username);
                localStorage.setItem('token', data.token);
                location.reload();
            } else { alert("รหัสผ่านไม่ถูกต้อง"); }
        }

        async function handleRegister() {
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });
            const data = await res.json();
            if(data.success) { alert("สมัครสำเร็จ! กรุณาล็อคอิน"); toggleAuth('login'); }
        }

        function handleLogout() {
            localStorage.clear();
            location.reload();
        }
		
		
		
		// ฟังก์ชันรับข้อมูลจาก Google
async function handleCredentialResponse(response) {
    try {
        const res = await fetch('/api/auth/google', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ token: response.credential })
        });
        const data = await res.json();

        if (data.success) {
            if (data.isNewUser) {
                // 🚩 กรณีสมาชิกใหม่ซิงๆ: ให้ไปหน้าตั้ง Username หลักก่อน (หรือตั้งรวบยอด)
                showRegisterModal(data.googleData);
            } else {
                // ✅ สมาชิกเดิม: เช็คต่อว่ามี "ชื่อในเกม" หรือยัง
                localStorage.setItem('username', data.user.username);
                localStorage.setItem('token', 'session_token_here'); // ตามระบบของพี่
                
                if (!data.user.gameNickname) {
                    document.getElementById('nickname-modal').style.display = 'flex';
                } else {
                    location.reload(); // เข้าเกมเลย
                }
            }
        }
    } catch (e) { console.error("Google Login Error", e); }
}

// ฟังก์ชันถอดรหัส Token เบื้องต้น (สำหรับแสดงผลหน้าจอ)
function decodeJwtResponse(token) {
    let base64Url = token.split('.')[1];
    let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(window.atob(base64));
}




        // --- เช็คโปรไฟล์หลังโหลดหน้า ---
        window.onload = async () => {
            if (!currentUser) {
                document.getElementById('view-auth').classList.add('active');
            } else {
                document.getElementById('view-map').classList.add('active');
                checkGameProfile();
            }
        };

        async function checkGameProfile() {
            try {
                const res = await fetch(`/api/game/stats/${currentUser}`);
                const data = await res.json();
                if (!data.gameNickname) {
                    document.getElementById('nickname-modal').style.display = 'flex';
                } else {
                    document.getElementById('display-nickname').innerText = data.gameNickname.toUpperCase();
                    document.getElementById('val-metal').innerText = data.metal;
                    document.getElementById('val-energy').innerText = data.energy + "%";
                }
            } catch(e) { console.error(e); }
        }

        async function saveGameNickname() {
            const nick = document.getElementById('input-nickname').value.trim();
            if(nick.length < 3) return alert("ชื่อสั้นเกินไป");
            const res = await fetch('/api/game/set-nickname', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: currentUser, nickname: nick})
            });
            if((await res.json()).success) location.reload();
        }

        // --- ระบบวาด Grid (Radius 30, 5x5) ---
        function renderGrid() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const hexRadius = 30;
            const h = hexRadius * Math.sqrt(3);
            const w = hexRadius * 1.5;

            for (let q = -2; q <= 2; q++) {
                for (let r = -2; r <= 2; r++) {
                    const xPos = centerX + (q * w);
                    const yPos = centerY + (r * h) + (Math.abs(q) % 2 === 1 ? h/2 : 0);
                    const isCenter = (q === 0 && r === 0);

                    ctx.beginPath();
                    ctx.strokeStyle = isCenter ? '#38ef7d' : 'rgba(0, 210, 255, 0.3)';
                    ctx.lineWidth = isCenter ? 3 : 1;
                    for (let i = 0; i < 6; i++) {
                        ctx.lineTo(xPos + hexRadius * Math.cos(i * Math.PI / 3), yPos + hexRadius * Math.sin(i * Math.PI / 3));
                    }
                    ctx.closePath();
                    if(isCenter) { ctx.fillStyle = 'rgba(56, 239, 125, 0.1)'; ctx.fill(); }
                    ctx.stroke();
                }
            }
        }

        function toggleMapMode() {
            mapActive = !mapActive;
            bg.classList.toggle('bg-dimmed', mapActive);
            canvas.style.opacity = mapActive ? "1" : "0";
            if(mapActive) renderGrid();
        }

        // ระบบขุดแร่
        canvas.onclick = (e) => {
            if(!mapActive) return;
            startMining();
        };

        function startMining() {
            document.getElementById('view-map').classList.remove('active');
            document.getElementById('view-mining').style.display = 'flex';
            isMining = true;
            let p = 0;
            let t = setInterval(() => {
                if(!isMining) { clearInterval(t); return; }
                p += 2;
                document.getElementById('mining-bar').style.width = p + "%";
                if(p >= 100) { clearInterval(t); finishMining(); }
            }, 100);
        }

        async function finishMining() {
            const res = await fetch('/api/mine', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: currentUser, drillLevel: 1})
            });
            const data = await res.json();
            document.getElementById('val-metal').innerText = data.metal;
            document.getElementById('val-energy').innerText = data.energy + "%";
            alert("ขุดสำเร็จ!");
            exitMining();
        }

        function exitMining() {
            isMining = false;
            document.getElementById('view-mining').style.display = 'none';
            document.getElementById('view-map').classList.add('active');
            document.getElementById('mining-bar').style.width = "0%";
        }

        function openMenu(id) { document.getElementById(id).style.display = 'flex'; }
        function closeMenus(e) { if(e.target.className === 'menu-overlay') e.target.style.display = 'none'; }
    </script>
</body>
</html>
